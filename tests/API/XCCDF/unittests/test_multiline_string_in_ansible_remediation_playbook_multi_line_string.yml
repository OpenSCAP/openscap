---


- hosts: all
  vars:
    www_value_val1: |
      This is a test string
      with newlines

      and empty lines

      useful for things like:
      - banners
      - bash commands

      or other things that need to be indented.
    www_value_nonexistent: "dummy value because the variable does not exist"
    www_value_val2: !!str |
      Another very long string.
      But this time it's a multiline string.
          It looks much nicer
          more readable
          and easier to write.
      That's it!
  tasks:
    - name: rule1
      ansible.builtin.copy:
        dest: /foo/bar
        content: "bar {{ www_value_val1 }}"
      tags:
        - foo
        - bar

    - name: rule2
      ansible.builtin.copy:
        dest: /foo/baz
        content: "baz {{ www_value_val2 }}"
      tags:
        - foo
        - baz

